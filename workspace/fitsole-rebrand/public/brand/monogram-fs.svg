<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Fitsole — F+S monogram">
  <title>Fitsole — F+S monogram</title>
  <desc>Geometric F+S monogram. F lives in the top-left, S threads through the right vertical. Terracotta dot above stands for the "i" of "Fitsole" (kept legible at favicon scale).</desc>
  <defs>
    <style>
      .ink { fill: oklch(15% 0.008 80); }
      .accent { fill: oklch(54% 0.13 35); }
      .paper { fill: oklch(97% 0.008 80); }
    </style>
  </defs>
  <!-- Plate background — kept paper so it works on light AND dark by mask. -->
  <rect class="paper" width="64" height="64" rx="6"/>

  <!-- F : top-left arm structure -->
  <rect class="ink" x="10" y="10" width="6" height="44" rx="0.5"/>
  <rect class="ink" x="10" y="10" width="24" height="6" rx="0.5"/>
  <rect class="ink" x="10" y="28" width="18" height="6" rx="0.5"/>

  <!-- S : 3-bar threading -->
  <rect class="ink" x="34" y="22" width="20" height="5" rx="0.5"/>
  <rect class="ink" x="34" y="22" width="5" height="11" rx="0.5"/>
  <rect class="ink" x="34" y="30" width="20" height="5" rx="0.5"/>
  <rect class="ink" x="49" y="30" width="5" height="12" rx="0.5"/>
  <rect class="ink" x="34" y="38" width="20" height="5" rx="0.5"/>

  <!-- Terracotta accent dot — visual link to the i-dot in the wordmark -->
  <circle class="accent" cx="58" cy="10" r="3"/>
</svg>
