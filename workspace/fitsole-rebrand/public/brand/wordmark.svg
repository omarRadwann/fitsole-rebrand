<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" role="img" aria-label="Fitsole">
  <title>Fitsole</title>
  <desc>Fitsole wordmark — geometric construction, 1.5:1 tracking, terracotta i-dot. Concept wordmark for Full Lift 2026-05-20; pending senior brand designer review.</desc>
  <defs>
    <style>
      .glyph { fill: currentColor; }
      .accent { fill: oklch(54% 0.13 35); }
    </style>
  </defs>

  <!-- F : 3 horizontals + vertical, top arm extends slightly long (signature). -->
  <g class="glyph">
    <rect x="6" y="10" width="9" height="60" rx="0.5"/>
    <rect x="6" y="10" width="38" height="9" rx="0.5"/>
    <rect x="6" y="36" width="28" height="9" rx="0.5"/>
  </g>

  <!-- i : vertical stem + terracotta dot floating above. The signature element. -->
  <rect class="glyph" x="50" y="28" width="9" height="42" rx="0.5"/>
  <circle class="accent" cx="54.5" cy="16.5" r="6.5"/>

  <!-- t : crossbar + vertical (rises above crossbar). Custom: crossbar offset right. -->
  <g class="glyph">
    <rect x="76" y="10" width="9" height="60" rx="0.5"/>
    <rect x="68" y="22" width="26" height="8" rx="0.5"/>
  </g>

  <!-- s : 4-stroke construction — separated bars + offset connectors. Custom geometric S. -->
  <g class="glyph">
    <rect x="103" y="22" width="30" height="9" rx="0.5"/>
    <rect x="103" y="22" width="9" height="22" rx="0.5"/>
    <rect x="103" y="36" width="30" height="9" rx="0.5"/>
    <rect x="124" y="36" width="9" height="25" rx="0.5"/>
    <rect x="103" y="52" width="30" height="9" rx="0.5"/>
  </g>

  <!-- o : hexagonal silhouette, not a circle. Signature geometric statement. -->
  <path class="glyph" d="M 152 22 L 168 22 L 175 41 L 168 60 L 152 60 L 145 41 Z M 152 31 L 165 31 L 169 41 L 165 51 L 152 51 L 148 41 Z" />

  <!-- l : single tall vertical, ascends higher than other lowercase forms. -->
  <rect class="glyph" x="185" y="10" width="9" height="60" rx="0.5"/>

  <!-- e : 3 horizontals + vertical, bottom-right corner extended. -->
  <g class="glyph">
    <rect x="208" y="22" width="9" height="39" rx="0.5"/>
    <rect x="208" y="22" width="28" height="9" rx="0.5"/>
    <rect x="208" y="36" width="22" height="8" rx="0.5"/>
    <rect x="208" y="52" width="28" height="9" rx="0.5"/>
  </g>

  <!-- Underline mark — a single hairline + terracotta tick on the left.
       Used in the "lockup" treatment when paired with a tagline. -->
  <g opacity="0.0" id="lockup-underline">
    <rect class="glyph" x="6" y="75" width="232" height="1" opacity="0.4"/>
    <rect class="accent" x="6" y="75" width="22" height="1"/>
  </g>
</svg>
