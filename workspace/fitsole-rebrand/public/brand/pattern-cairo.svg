<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 80" preserveAspectRatio="xMidYMid meet">
  <title>Fitsole pattern — Cairo skyline silhouette</title>
  <desc>A condensed Cairo skyline ornament — minaret, dome, palms, low-rise rooftops, ring-road edge. Used as a footer divider and editorial flourish. All forms abstract, no real-building reproduction.</desc>
  <g fill="oklch(15% 0.008 80)" opacity="0.86">
    <!-- ring road horizon -->
    <rect x="0" y="72" width="600" height="2"/>
    <!-- low-rise block #1 -->
    <rect x="20" y="48" width="40" height="24"/>
    <rect x="22" y="52" width="3" height="3" fill="oklch(54% 0.13 35)"/>
    <rect x="30" y="58" width="3" height="3" fill="oklch(54% 0.13 35)"/>
    <!-- mosque dome + minaret -->
    <rect x="76" y="40" width="2.5" height="34"/>
    <circle cx="77.5" cy="38" r="1.6"/>
    <path d="M 92 50 Q 100 36 108 50 L 108 72 L 92 72 Z"/>
    <rect x="98" y="32" width="4" height="20"/>
    <circle cx="100" cy="30" r="2"/>
    <!-- low-rise block #2 -->
    <rect x="124" y="52" width="56" height="20"/>
    <!-- antenna -->
    <rect x="150" y="40" width="1.5" height="12"/>
    <!-- palm trees -->
    <g transform="translate(196 72)">
      <rect x="-1" y="-20" width="2" height="20"/>
      <path d="M 0 -22 Q -8 -25 -12 -20 M 0 -22 Q 8 -25 12 -20 M 0 -22 Q -3 -30 -6 -28 M 0 -22 Q 3 -30 6 -28" stroke="oklch(15% 0.008 80)" stroke-width="1.2" fill="none"/>
    </g>
    <!-- repeat skyline -->
    <rect x="220" y="44" width="48" height="28"/>
    <rect x="232" y="48" width="3" height="3" fill="oklch(54% 0.13 35)"/>
    <!-- mosque #2 (smaller) -->
    <rect x="276" y="46" width="2" height="26"/>
    <path d="M 290 56 Q 295 46 300 56 L 300 72 L 290 72 Z"/>
    <rect x="294" y="40" width="2.5" height="16"/>
    <!-- block run -->
    <rect x="316" y="52" width="80" height="20"/>
    <rect x="340" y="58" width="3" height="3" fill="oklch(54% 0.13 35)"/>
    <rect x="360" y="60" width="3" height="3" fill="oklch(54% 0.13 35)"/>
    <!-- palm cluster -->
    <g transform="translate(412 72)">
      <rect x="-1" y="-18" width="2" height="18"/>
      <path d="M 0 -20 Q -7 -23 -10 -18 M 0 -20 Q 7 -23 10 -18" stroke="oklch(15% 0.008 80)" stroke-width="1.2" fill="none"/>
    </g>
    <!-- final tall building (modern) -->
    <rect x="440" y="34" width="22" height="38"/>
    <g fill="oklch(54% 0.13 35)" opacity="0.6">
      <rect x="444" y="40" width="3" height="3"/>
      <rect x="452" y="46" width="3" height="3"/>
      <rect x="456" y="52" width="3" height="3"/>
    </g>
    <!-- end-cap blocks -->
    <rect x="478" y="50" width="44" height="22"/>
    <rect x="530" y="56" width="50" height="16"/>
    <rect x="544" y="60" width="3" height="3" fill="oklch(54% 0.13 35)"/>
  </g>
</svg>
