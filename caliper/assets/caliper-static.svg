<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 600" role="img" aria-labelledby="cal-title cal-desc" preserveAspectRatio="xMidYMid meet">
  <title id="cal-title">Caliper instrument, static schematic</title>
  <desc id="cal-desc">A precision caliper with fixed and sliding jaws, vernier scale, and a measurement annotation. Reduced-motion and WebGL-fail fallback for the interactive instrument.</desc>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="oklch(75% 0.03 245)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- background paper -->
  <rect width="540" height="600" fill="oklch(96% 0.015 85)"/>
  <rect width="540" height="600" fill="url(#grid)" opacity="0.55"/>

  <!-- horizontal mm rule across middle -->
  <g stroke="oklch(55% 0.04 245)" stroke-width="1">
    <line x1="40" y1="300" x2="500" y2="300"/>
    <!-- tick marks -->
    <g>
      <line x1="40"  y1="296" x2="40"  y2="304"/>
      <line x1="120" y1="296" x2="120" y2="304"/>
      <line x1="200" y1="296" x2="200" y2="304"/>
      <line x1="280" y1="296" x2="280" y2="304"/>
      <line x1="360" y1="296" x2="360" y2="304"/>
      <line x1="440" y1="296" x2="440" y2="304"/>
    </g>
    <g stroke="oklch(75% 0.03 245)">
      <line x1="80"  y1="298" x2="80"  y2="302"/>
      <line x1="160" y1="298" x2="160" y2="302"/>
      <line x1="240" y1="298" x2="240" y2="302"/>
      <line x1="320" y1="298" x2="320" y2="302"/>
      <line x1="400" y1="298" x2="400" y2="302"/>
      <line x1="480" y1="298" x2="480" y2="302"/>
    </g>
  </g>

  <!-- caliper body (fixed jaw on left, beam horizontal, sliding jaw past middle) -->
  <g stroke="oklch(35% 0.020 250)" stroke-width="1.5" fill="oklch(72% 0.012 250)">
    <!-- beam -->
    <rect x="70" y="285" width="400" height="14"/>
    <!-- fixed jaw arm (down) -->
    <rect x="60" y="285" width="20" height="100"/>
    <!-- fixed jaw tip -->
    <rect x="60" y="375" width="40" height="14"/>
    <!-- sliding jaw arm -->
    <rect x="320" y="285" width="20" height="100"/>
    <!-- sliding jaw tip -->
    <rect x="300" y="375" width="40" height="14"/>
    <!-- vernier scale window over beam -->
    <rect x="220" y="262" width="120" height="22" fill="oklch(85% 0.012 250)"/>
  </g>

  <!-- vernier hash marks inside window -->
  <g stroke="oklch(20% 0.020 250)" stroke-width="1">
    <line x1="232" y1="265" x2="232" y2="281"/>
    <line x1="244" y1="270" x2="244" y2="281"/>
    <line x1="256" y1="265" x2="256" y2="281"/>
    <line x1="268" y1="270" x2="268" y2="281"/>
    <line x1="280" y1="265" x2="280" y2="281"/>
    <line x1="292" y1="270" x2="292" y2="281"/>
    <line x1="304" y1="265" x2="304" y2="281"/>
    <line x1="316" y1="270" x2="316" y2="281"/>
    <line x1="328" y1="265" x2="328" y2="281"/>
  </g>

  <!-- measurement: the gap between fixed-jaw tip and sliding-jaw tip -->
  <!-- mark line between jaw tips at y=395 -->
  <g stroke="oklch(62% 0.27 0)" stroke-width="1.5" fill="oklch(62% 0.27 0)">
    <!-- left tick -->
    <line x1="80" y1="404" x2="80" y2="430"/>
    <!-- right tick -->
    <line x1="320" y1="404" x2="320" y2="430"/>
    <!-- measurement line -->
    <line x1="80" y1="420" x2="320" y2="420"/>
    <!-- arrows -->
    <polygon points="80,420 90,415 90,425"/>
    <polygon points="320,420 310,415 310,425"/>
    <!-- value -->
    <rect x="170" y="409" width="60" height="22" fill="oklch(96% 0.015 85)" stroke="oklch(62% 0.27 0)" stroke-width="1"/>
    <text x="200" y="425" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" text-anchor="middle" fill="oklch(62% 0.27 0)">28.0 mm</text>
  </g>

  <!-- leader line + label: "fixed jaw" -->
  <g stroke="oklch(45% 0.018 250)" stroke-width="0.75" fill="oklch(45% 0.018 250)">
    <line x1="70" y1="335" x2="30" y2="335"/>
    <line x1="30" y1="335" x2="30" y2="200"/>
    <text x="20" y="195" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="oklch(45% 0.018 250)">fixed jaw</text>
  </g>

  <!-- leader line + label: "sliding jaw" -->
  <g stroke="oklch(45% 0.018 250)" stroke-width="0.75" fill="oklch(45% 0.018 250)">
    <line x1="330" y1="335" x2="510" y2="335"/>
    <line x1="510" y1="335" x2="510" y2="200"/>
    <text x="455" y="195" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="oklch(45% 0.018 250)">sliding jaw</text>
  </g>

  <!-- leader line + label: "vernier" -->
  <g stroke="oklch(45% 0.018 250)" stroke-width="0.75" fill="oklch(45% 0.018 250)">
    <line x1="280" y1="262" x2="280" y2="120"/>
    <text x="260" y="115" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="oklch(45% 0.018 250)">vernier</text>
  </g>

  <!-- bottom mode legend -->
  <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="oklch(45% 0.018 250)">
    <text x="40" y="528" font-weight="500" fill="oklch(20% 0.020 250)">positions</text>
    <text x="40" y="546">[1] disengaged — jaws fully open</text>
    <text x="40" y="562">[2] seeking — closing onto target</text>
    <text x="40" y="578">[3] measuring — locked, value visible</text>
  </g>
  <g stroke="oklch(62% 0.27 0)" stroke-width="2">
    <rect x="270" y="538" width="12" height="12" fill="none"/>
    <text x="288" y="548" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="oklch(62% 0.27 0)">— current</text>
  </g>
</svg>
